services:
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./html:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - webnet

  api:
    build: ./api
    container_name: ai-siem-api
    networks:
      - webnet

networks:
  webnet:
