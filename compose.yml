services:

  nginx:
    image: nginx:latest
    container_name: ai-siem-nginx
    ports:
      - "8080:80"
    volumes:
      - ./html:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
    networks:
      - webnet


  api:
    build: ./api
    container_name: ai-siem-api
    depends_on:
      - elasticsearch
    networks:
      - webnet


  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: ai-siem-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    networks:
      - webnet

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: ai-siem-kibana
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - webnet


volumes:
  elastic_data:


networks:
  webnet:
